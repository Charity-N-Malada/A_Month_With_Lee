<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Month of Us ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:black;
}

.background{
    position:absolute;
    width:100%;
    height:100%;
    background:url("us.jpeg") center/cover no-repeat;
    filter:brightness(0.45);
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
}

.title{
    position:absolute;
    top:8%;
    width:100%;
    text-align:center;
    color:white;
    font-size:3rem;
    z-index:2;
}

.popup{
    position:absolute;
    color:white;
    background:rgba(255,255,255,0.15);
    padding:14px 22px;
    border-radius:20px;
    backdrop-filter:blur(6px);
    font-size:1.1rem;
    opacity:0;
    animation:floatUp 7s ease forwards;
    z-index:2;
}

.button{
    position:absolute;
    bottom:8%;
    left:50%;
    transform:translateX(-50%);
    padding:14px 24px;
    border:none;
    border-radius:30px;
    background:white;
    color:black;
    cursor:pointer;
    font-size:1rem;
    z-index:3;
}

.final{
    position:absolute;
    bottom:18%;
    width:100%;
    text-align:center;
    color:white;
    font-size:1.3rem;
    opacity:0;
    animation:fadeIn 3s ease forwards;
    animation-delay:22s;
    z-index:2;
}

.heart{
    position:absolute;
    color:white;
    animation:rise 10s linear infinite;
}

@keyframes rise{
    0%{
        transform:translateY(100vh);
        opacity:0;
    }

    10%{
        opacity:0.7;
    }

    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}

@keyframes floatUp{
    0%{
        opacity:0;
        transform:translateY(20px);
    }

    15%{
        opacity:1;
    }

    85%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:translateY(-30px);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<h1 class="title">A Month of Us ❤️</h1>

<button class="button" onclick="startStory()">
    Start Our Story ✨
</button>

<div class="final">
    Thank you for the sweetest month 🤍
</div>

<script>

const messages = [

"Ballroom dancing together 💃",
"Kissing my hand or forehead ❤️",
"Getting shy when I see you sometimes 🥺",
"You opening doors for me 🚪",
"Supporting me when I need it most 🤍",
"Having the biggest laughs together😁",
"Melting into your hugs and loving your height 🥺"
"Listening to all my yapping…even if you somehow yap even more than me 😭",
"Seeing you be a superstar💻",
"Getting to stare at your handsome face💋",

"One month down, many more to go ✨"

];

function startStory(){

    document.querySelector(".button").style.display = "none";

    document.getElementById("music").play();

    messages.forEach((text, index) => {

        setTimeout(() => {

            const popup = document.createElement("div");

            popup.className = "popup";

            popup.innerText = text;

            popup.style.left =
                Math.random() * 70 + 10 + "%";

            popup.style.top =
                Math.random() * 60 + 20 + "%";

            document.body.appendChild(popup);

            setTimeout(() => {
                popup.remove();
            }, 7000);

        }, index * 3000);

    });

    createHearts();
}

function createHearts(){

    setInterval(() => {

        const heart = document.createElement("div");

        heart.className = "heart";

        heart.innerHTML = "❤";

        heart.style.left =
            Math.random() * 100 + "vw";

        heart.style.fontSize =
            Math.random() * 20 + 15 + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 10000);

    }, 500);
}

</script>

</body>
</html>
